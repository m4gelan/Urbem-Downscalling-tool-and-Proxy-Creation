sector: J_Waste
enabled: true
mode: mixed
output_dir: OUTPUT/Proxy_weights/J_Waste
# Used by PROXY.main for logging; the waste pipeline writes two rasters (see output_filename_area/point)
output_filename: waste_areasource.tif
output_filename_area: waste_areasource.tif
output_filename_point: waste_pointsource.tif
pad_m: 5000.0
vector_layers: [osm_waste_polygons, osm_waste_points]
cams_emission_category_indices: [13]
cams_source_type_indices: [2]
pollutant_var: ch4
pollutant_name: CH4
point_matching:
  enabled: true
  # EPRTR air + UWWTD plants (same GPKG as spatial proxy); max km also in eprtr_scoring J_Waste.
  facility_pool: waste_eprtr_plus_uwwtd
cams_country_iso3: GRC
nuts_cntr: EL

cams:
  gnfr: J
  source_types:
    - area
  domain_bbox_wgs84: null

visualization:
  visualization_weight_band: 1
  # Order for the Folium weight panel; pollutants with no band in the GeoTIFF are skipped.
  visualization_pollutants: [CH4, NOx, NMVOC]
  weight_display: per_cell

waste:
  ceip:
    ceip_alpha_mode: reported_eu27
  output_filename_area: waste_areasource.tif
  output_filename_point: waste_pointsource.tif
  write_intermediates: false

subsector_shares:
  solid: 1.0
  ww: 1.0
  res: 1.0
waste_subsector_layers:
  solid: [osm_waste_polygons, osm_waste_points]

