sector: C_OtherCombustion
enabled: true
mode: area
output_dir: OUTPUT/Proxy_weights/C_OtherCombustion
output_filename: othercombustion_areasource.tif

# NUTS clip uses `python -m PROXY.main build --country EL` (CNTR_CODE).
cams_country_iso3: GRC

corine:
  band: 1
  pad_m: 5000.0
  # EEA/Copernicus 8-bit style: raster values are 1..N class indices; map in PROXY/config/corine/eea44_index_to_l3.yaml
  pixel_encoding: eea44_index
  # pixel_value_map: PROXY/config/corine/my_custom_l3_list.yaml

cams:
  gnfr: C
  source_types:
    - area
  domain_bbox_wgs84: null

base_proxy:
  heat_exp: 0.7
  gfa_exp: 0.3
  use_additive_instead: false
  additive_heat_weight: 0.7
  additive_gfa_weight: 0.3
  epsilon: 1.0e-12

morphology:
  urban_111: 111
  urban_112: 112
  urban_121: 121
  residential_fireplace_heating_stove:
    w111: 0.6
    w112: 1.3
    w_other: 1.0
  commercial_boilers:
    w111: 1.2
    w121: 1.8
    w_other: 0.5

gains:
  year_column: "2020"
  iso3_file_overrides: {}

eurostat:
  # When true, loads household end-uses (nrg_d_hhq) + commercial split (nrg_bal_s) via API; cache under PROXY/cache/eurostat/.
  enabled: true
  api:
    timeout_s: 30
    offline: false
  end_use_sheet: Table 3_2023
  fuel_mix_sheet: Table 1_2021

rural_bias:
  enabled: false
  source: population
  rural_min: 0.4
  classes:
    - R_FIREPLACE
    - R_HEATING_STOVE

co2:
  mode: sum_ff_bf

pollutants:
  - output: nh3
    cams_var: nh3
  - output: nox
    cams_var: nox
  - output: sox
    cams_var: sox
  - output: nmvoc
    cams_var: nmvoc
  - output: pm2_5
    cams_var: pm2_5
  - output: pm10
    cams_var: pm10
  - output: co
    cams_var: co
  - output: co2_total
    cams_var: null
    from_co2_mode: true

hotmaps:
  heat_res: heat_res_curr_density.tif
  heat_nonres: heat_nonres_curr_density.tif
  gfa_res: gfa_res_curr_density.tif
  gfa_nonres: gfa_nonres_curr_density.tif

run:
  write_weights_geotiff: true
  write_emissions_geotiffs: false
  write_weight_geotiffs: false
  show_progress: true

visualization:
  visualization_weight_band: 1
  visualization_pollutant: null
  corine_opacity: 0.75
  hotmaps_opacity: 0.62
  weight_opacity: 0.92
