sector: B_Industry
enabled: true
mode: mixed
output_dir: OUTPUT/Proxy_weights/B_Industry
output_filename: industry_areasource.tif
pad_m: 5000.0

cams_country_iso3: GRC

# CAMS-REG point sources for GNFR B (emission_category_index 2, source_type point = 2).
cams_emission_category_indices: [2]
cams_source_type_indices: [2]
pollutant_var: nox
pollutant_name: NOx
point_matching:
  enabled: true
  # facility_pool: eprtr  # default — paths.yaml eprtr.facilities

cams:
  gnfr: B
  source_types:
    - area
  domain_bbox_wgs84: null

visualization:
  visualization_pollutant: "CH4, NMVOC, SOX"
  # Weight layers use GeoTIFF band pollutant names (CH4, NMVOC, SOx, …).
  # Optional override: weight_band_layer_names: [ "CH4", "NMVOC", "SOx" ]
  cov_layer_name: "Covariance (3 pollutants)"
  # Per-CAMS-cell 0–1 colormap when CAMS NetCDF is available; else global percentile.
  weight_display_mode: auto
  weight_opacity: 0.92
  context_layer_opacity: 0.82

industry_paths:
  ceip_groups_yaml: PROXY/config/ceip/profiles/B_Industry_groups.yaml
  ceip_rules_yaml: PROXY/config/ceip/profiles/B_Industry_rules.yaml
  ceip_years: null
  cntr_code_to_iso3:
    EL: GRC
    GR: GRC

pollutants:
  - ch4
  - co
  - nh3
  - nmvoc
  - nox
  - pm10
  - pm2_5
  - sox

ceip_pollutant_aliases:
  PM25: PM2_5
  PM2.5: PM2_5
  NOX: NOX
  NMVOC: NMVOC
  SO2: SOX
  SOX: SOX
  CH4: CH4
  CO: CO
  NH3: NH3

proxy:
  log_input_stats: false
  osm_tile_pixels: 256
  osm_subdivide_factor: 4
 
output:
  write_debug_rasters: false

run:
  show_progress: true

logging:
  level: WARNING
