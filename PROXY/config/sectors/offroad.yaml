sector: I_Offroad
enabled: true
mode: area
output_dir: OUTPUT/Proxy_weights/I_Offroad
output_filename: offroad_areasource.tif
pad_m: 5000.0
cams_country_iso3: GRC

# Multiband GeoTIFF: one band per pollutant. Each band is CAMS-cell–normalized weights
# combining OSM rail (1A3c), OSM pipeline (1A3ei), and CORINE-only agri+ind non-road (1A3eii),
# mixed using national CEIP-style shares from the workbook below.
#
# OSM rail lifecycle filters (tram/subway are included when present in the extract)
# live in paths.yaml under ``proxy_rules.osm_railway``.

area_proxy:
  source_type_index: 1
  cams_emission_category_index: 12
  corine_band: 1

  ceip_workbook: INPUT/Proxy/Alpha/Reported_Emissions_EU27_2018_2023.xlsx
  ceip_sheet: null

  cntr_code_to_iso3:
    EL: GRC
    GR: GRC

  defaults:
    # Triple-leg shares use every year-sheet in the workbook: per-year (1A3c,1A3ei,1A3eii)
    # shares are averaged across years (``ceip_year`` is not used for I_Offroad).
    fallback_country_iso3: GRC
    default_shares_rail: 0.34
    default_shares_pipe: 0.33
    default_shares_nonroad: 0.33

  pollutants:
    - nox
    - pm2_5
    - nh3
    - co
    - nm_voc
    - so2

  ceip_pollutant_aliases:
    NOX: nox
    PM25: pm2_5
    PM2.5: pm2_5
    PM2_5: pm2_5
    NMVOC: nm_voc
    SOX: so2
    SO2: so2

  facilities_tif: null

  proxy:
    rail_buffer_m: 150
    pipeline_buffer_m: 75
    osm_subdivide: 4
    pipe_fac_weight: 0.8
    pipe_raw_weight: 0.2
    w_agri: 0.5
    w_ind: 0.35
    corine_agri_codes:
      - 211
      - 212
      - 213
      - 241
      - 242
      - 243
    corine_agri_optional:
      - 221
      - 222
      - 223
    corine_ind_codes:
      - 121
      - 131
      - 133
    corine_ind_optional:
      - 123

  visualization_weight_band: 1
  visualization_pollutant: null

  corine_viz_layers:
    agriculture:
      corine_codes: [211, 212, 213, 221, 222, 223, 241, 242, 243]
      color_rgb: [46, 125, 50]
    industrial:
      corine_codes: [121, 131, 133, 123]
      color_rgb: [183, 28, 28]
    rail_hint:
      corine_codes: [122]
      color_rgb: [21, 101, 192]
    pipeline_hint:
      corine_codes: [121, 3]
      color_rgb: [198, 40, 40]
