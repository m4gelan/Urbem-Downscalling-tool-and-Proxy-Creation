sector: D_Fugitive
enabled: true
mode: area
output_dir: OUTPUT/Proxy_weights/D_Fugitive
output_filename: fugitive_areasource.tif
pad_m: 5000.0

cams_country_iso3: GRC

# CAMS-REG point sources for GNFR D (emission_category_index 4, source_type point = 2).
# Point-matching knobs: edit ``point_matching`` below, or only ``eprtr_scoring.yaml`` sector_profiles.D_Fugitive.
cams_emission_category_indices: [4]
cams_source_type_indices: [2]
pollutant_var: ch4
pollutant_name: CH4
point_matching:
  enabled: true
  # facility_pool: eprtr  # default — paths.yaml eprtr.facilities
  # Optional overrides (omit keys to use values from eprtr_scoring.yaml sector_profiles.D_Fugitive):
  preferred_eprtr_sector_codes: [1, 3, 4]
  max_match_distance_km: 25.0

cams:
  gnfr: D
  source_types:
    - area
  domain_bbox_wgs84: null

visualization:
  visualization_pollutant: "CO, NMVOC, PM10"
  weight_opacity: 0.92
  context_layer_opacity: 0.82

fugitive_paths:
  ceip_groups_yaml: PROXY/config/ceip/profiles/fugitive_groups.yaml
  ceip_years: null
  viirs_nightfire_csv: INPUT/Proxy/ProxySpecific/Fugitive/VNF_npp_d20210101_noaa_v30.csv
  gcmt_xlsx: INPUT/Proxy/ProxySpecific/Fugitive/Global-Coal-Mine-Tracker-May-2025-V2.xlsx
  goget_xlsx: INPUT/Proxy/ProxySpecific/Fugitive/Global-Oil-and-Gas-Extraction-Tracker-March-2026.xlsx
  cntr_code_to_iso3:
    EL: GRC
    GR: GRC

pollutants:
  - ch4
  - co
  - nh3
  - nmvoc
  - nox
  - pm10
  - pm2_5
  - sox

ceip_pollutant_aliases:
  PM25: PM2_5
  PM2.5: PM2_5
  NOX: NOX
  NMVOC: NMVOC
  SO2: SOX
  SOX: SOX
  CH4: CH4
  CO: CO
  NH3: NH3

proxy:
  log_input_stats: false
  osm_tile_pixels: 256
  osm_subdivide_factor: 4
  viirs_sigma_m: 750.0
  # If true (default): CAMS cells where this group's blended sector z-score is ~0 use population proxy.
  # If false: keep zero sector score there (e.g. CO group-2 only — choose uniform vs pop via gnfr norm).
  cam_cell_zero_z_pop_fallback: false

output:
  write_debug_rasters: false

run:
  show_progress: true

logging:
  level: WARNING
