sector: K_Agriculture
enabled: true
mode: area
output_dir: OUTPUT/Proxy_weights/K_Agriculture
output_filename: agriculture_areasource.tif
pad_m: 5000.0
nuts_cntr: EL
cams_country_iso3: GRC
cams_emission_category_indices: [14, 15]

# CEIP seven proxy families (see PROXY/config/ceip/profiles/K_Agriculture_groups.yaml).
ceip_group_order:
  - family_1
  - family_2
  - family_3
  - family_4
  - family_5
  - family_6
  - family_7

pollutants:
  - output: nh3
    cams_var: nh3
  - output: nox
    cams_var: nox
  - output: nmvoc
    cams_var: nmvoc
  - output: co
    cams_var: co
  - output: pm10
    cams_var: pm10
  - output: pm2_5
    cams_var: pm2_5

agriculture:
  write_intermediates: false

visualization:
  weight_display: per_cell
  visualization_weight_band: 1
  weight_opacity: 0.9
