# E_Solvents area pipeline defaults (merged under sector YAML `solvents:`).
# CEIP workbook -> subsector alphas use `ceip/profiles/solvents_subsectors.yaml`.
# Country alpha fallbacks: `ceip/alpha/fallback/` (E_Solvents_EL.yaml).

country:
  cams_iso3: GRC
  nuts_cntr: EL
paths: {}
corine:
  band: 1
  pad_m: 5000
pollutants:
- CO
- NOx
- NH3
- NMVOC
- PM10
- PM2_5
cams_pollutant_names:
  CO: co
  NOx: nox
  NH3: nh3
  NMVOC: nmvoc
  PM10: pm10
  PM2_5: pm2_5
subsectors:
- d3a_domestic
- d3b_road_paving
- d3c_asphalt_roofing
- d3d_coating
- d3e_degreasing
- d3f_dry_cleaning
- d3g_chemical_products
- d3h_printing
- d3i_other
beta:
  d3a_domestic:
    house: 1.0
    serv: 0.0
    ind: 0.0
    infra: 0.0
  d3b_road_paving:
    house: 0.0
    serv: 0.0
    ind: 0.0
    infra: 1.0
  d3c_asphalt_roofing:
    house: 0.0
    serv: 0.0
    ind: 0.2
    infra: 0.8
  d3d_coating:
    house: 0.4
    serv: 0.2
    ind: 0.4
    infra: 0.0
  d3e_degreasing:
    house: 0.0
    serv: 0.3
    ind: 0.7
    infra: 0.0
  d3f_dry_cleaning:
    house: 0.0
    serv: 1.0
    ind: 0.0
    infra: 0.0
  d3g_chemical_products:
    house: 0.0
    serv: 0.0
    ind: 1.0
    infra: 0.0
  d3h_printing:
    house: 0.0
    serv: 0.7
    ind: 0.3
    infra: 0.0
  d3i_other:
    house: 0.5
    serv: 0.3
    ind: 0.2
    infra: 0.0
generic_omega:
  house: 0.25
  serv: 0.25
  ind: 0.25
  infra: 0.25
normalization:
  method: quantile_minmax
  q_low: 0.01
  q_high: 0.99
corine_codes:
  residential_share:
  - 111
  - 112
  - 121
  - 122
  - 123
  - 124
  urban_fabric:
  - 111
  - 112
  service_land:
  - 121
  - 122
  - 123
  - 124
  - 131
  - 132
  industrial_clc:
  - 131
  - 132
  - 133
  - 141
  - 142
archetype_weights:
  house:
    population: 0.7
    residential_share: 0.3
  serv:
    urban_fabric: 0.4
    service_land: 0.35
    service_osm: 0.25
  ind:
    industry_clc: 0.35
    industry_osm: 0.35
    industry_buildings: 0.3
  infra:
    road_length: 0.35
    weighted_road_length: 0.35
    transport_area: 0.2
    roof_area: 0.1
osm:
  osm_point_buffer_m: 50.0
  osm_solvent_layers:
  - osm_landuse
  - osm_buildings
  - osm_aeroway
  - osm_roads
  solvent_layer_to_archetype:
    osm_landuse: serv
    osm_buildings: ind
    osm_aeroway: ind
  solvent_family_column: solvent_family
  solvent_family_to_archetype:
    solvent_industrial: ind
    solvent_commercial: serv
    solvent_service: serv
    solvent_other: ind
  roads_layer: lines
  landuse_layer: multipolygons
  motorway_scale: 3.0
  primary_scale: 2.0
  secondary_scale: 1.5
  default_scale: 1.0
  landuse_industrial:
  - industrial
  - commercial
  - retail
  - warehouse
  landuse_service:
  - retail
  - commercial
  - civic
  - public
  chunk_rows: 200000
tolerance_mass: 1.0e-05
