# Cross-country alpha fallback defaults used by core.alpha.fallback.resolve_alpha.
#
# These values are ONLY used when (a) the reported-emissions workbook has no value
# for a given (country, sector, subsector, pollutant) and (b) no country-specific
# override file exists at PROXY/config/ceip/alpha/fallback/<SECTOR>_<COUNTRY>.yaml.
#
# The initial content documents the *current* implicit defaults scattered across the
# codebase (see docs/refactor_notes.md, section "alpha fallbacks"). Editing a value
# here changes the fallback globally; editing a country file changes it for that
# country only. Missing keys fall through to the uniform 1/n ultimate fallback.
#
# Each subsector entry accepts either a per-pollutant value or a ``default`` entry.
version: 1

sectors:
  # B_Industry / D_Fugitive share the same four-group tensor (G1..G4). The current
  # Python code falls back to uniform 0.25 when all three tiers of reported data
  # are missing (see PROXY/core/ceip/reported_group_alpha.py build_alpha_tensor). This block makes that
  # default explicit so users can override per-country without touching code.
  B_Industry:
    G1:
      default: 0.25
    G2:
      default: 0.25
    G3:
      default: 0.25
    G4:
      default: 0.25
  D_Fugitive:
    G1:
      default: 0.25
    G2:
      default: 0.25
    G3:
      default: 0.25
    G4:
      default: 0.25

  # J_Waste families (solid / ww / res) - current Python code falls back to
  # country-mean over other pollutants, then EU-mean, then uniform 1/3.
  J_Waste:
    solid:
      default: 0.3333333333
    ww:
      default: 0.3333333333
    res:
      default: 0.3333333333

  # E_Solvents D3 subsectors - current code falls back to uniform 1/9 when both
  # reported workbook and country-specific JSON are empty. Values mirror the
  # Supersedes the old solvents alpha_fallback JSON (removed); use this YAML tree only.
  E_Solvents:
    d3a_domestic:      {default: 0.1111111111}
    d3b_road_paving:   {default: 0.1111111111}
    d3c_asphalt_roofing: {default: 0.1111111111}
    d3d_coating:       {default: 0.1111111111}
    d3e_degreasing:    {default: 0.1111111111}
    d3f_dry_cleaning:  {default: 0.1111111111}
    d3g_chemical_products: {default: 0.1111111111}
    d3h_printing:      {default: 0.1111111111}
    d3i_other:         {default: 0.1111111111}

  # I_Offroad triple-leg (rail / pipeline / non-road) - uniform 1/3 when CEIP is
  # missing (see core/alpha/ceip.py::_fill_ceip_defaults).
  I_Offroad:
    rail:
      default: 0.3333333333
    pipeline:
      default: 0.3333333333
    nonroad:
      default: 0.3333333333

  # K_Agriculture intentionally does NOT use reported national totals. Its alpha
  # values come from PROXY/config/agriculture/alpha.config.yaml. This entry is
  # included only for logging consistency.
  K_Agriculture: {}
