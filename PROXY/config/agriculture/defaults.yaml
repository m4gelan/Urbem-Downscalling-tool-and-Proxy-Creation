# K_Agriculture defaults (non-path knobs). Raster/tabular paths come from PROXY/config/paths.yaml
# and merge_k_agriculture_pipeline_cfg; do not rely on legacy Agriculture/... paths here.
project_root: null
run:
  country:
    - AT
    - BE
    - BG
    - CY
    - CZ
    - DE
    - DK
    - EE
    - EL
    - ES
    - FI
    - FR
    - HR
    - HU
    - IE
    - IT
    - LT
    - LU
    - LV
    - MT
    - NL
    - PL
    - PT
    - RO
    - SE
    - SI
    - SK
