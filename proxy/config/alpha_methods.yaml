# CEIP / reported-emissions -> group alpha weights (unified method 0–4 per sector x pollutant).
# Consumed by PROXY.core.alpha.alpha_method_engine.build_alpha_tensor_methods.
#
# method:
#   0 = country-specific split from reported workbook (groups/subsectors/families as wired per sector)
#   1 = Pool from workbook or mean-national blend. Set ``defaults.pool`` (and optionally per-pollutant ``pool``):
#       - ``pool: EU27`` or ``pool: EU11`` — single aggregate row (``COUNTRY`` = EU27 / EU11 in the workbook).
#       - ``pool: [ FRA, DEU, … ]`` — equal-weight mean of normalized national splits for those ISOs; if that fails,
#         fall back to the aggregate row (legacy ``eu_pool`` if present, else EU27).
#       Omit ``pool`` entirely ⇒ same as ``pool: EU27``.
#       Optional ``country_specific: [ … ]`` — listed ISOs use national splits; others use ``pool`` above.
#   2 = fixed alphas from sector.method_2[pollutant] -> { group_or_subsector_token: weight }
#   3 = equal weights across groups
#   4 = mean of alpha vectors from pollutants that used method 0 for the same country & sector (needs >=1)
#
# Pollutant keys: lowercase with underscores (nox, pm2_5, co2_total, …).
#
# method_2 weights: keys must match the alpha axis for that sector — B/D/C/J use ``G1``…``G4`` (J stops at ``G3``);
# E uses subsector ids; I_Offroad uses ``G1``…``G3``. Never use optional ``name:`` strings here.

