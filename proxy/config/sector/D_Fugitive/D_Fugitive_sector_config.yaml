  min_patch_area_m2: 50000
  max_match_distance_km: 30.0
  l3_codes_131:
    - 131
  l3_codes_121:
    - 121
  l3_codes_123:
    - 123
  
# OSM from fugitive_layers.gpkg (plugin default layer name ``osm_energy_polygons`` unless you rebuilt with --layer).
osm:
  metric_crs: EPSG:3035
  domain_clip_buffer_m: 0
  buffer_m:
    point: 0
    line: 0
    polygon: 25
  layer_order:
    - osm_energy_polygons
  rasterize:
    burn_value: 1.0
    fill: 0.0
    dtype: float32
    all_touched: true
  subgroups:
    coal_and_solid_fuels:
      slots:
        - id: quarry_coal_mine
          buffer_m:
            polygon: 40
          match:
            any_of:
              - landuse: quarry
              - resource: coal
              - industrial: mine
    oil_upstream_and_transport:
      slots:
        - id: pipeline_well
          buffer_m:
            polygon: 30
          match:
            any_of:
              - man_made: pipeline
              - man_made: petroleum_well
        - id: port_oil_depot
          buffer_m:
            polygon: 50
          match:
            any_of:
              - landuse: port
              - industrial: oil
              - industrial: depot
    storage_refining_distribution:
      slots:
        - id: refinery
          buffer_m:
            polygon: 35
          match:
            any_of:
              - industrial: refinery
        - id: tank_storage
          buffer_m:
            polygon: 25
          match:
            any_of:
              - man_made: storage_tank
              - man_made: tank
              - industrial: fuel_storage
        - id: fuel_depot
          buffer_m:
            polygon: 30
          match:
            any_of:
              - amenity: fuel
              - industrial: depot
    gas_flaring_and_residual_losses:
      slots:
        - id: flare_chimney
          buffer_m:
            polygon: 40
          match:
            any_of:
              - man_made: flare
              - man_made: chimney
        - id: power_gen
          buffer_m:
            polygon: 35
          match:
            any_of:
              - power: plant
              - power: generator
              - power: substation

gem_coal:
  non_closed_sheet: GCMT Non-closed Mines
  closed_sheet: GCMT Closed Mines
  country_column: Country / Area
  closed_disk_m: 200
  uniform_disk_m: null
  fallback_radius_m: 120
  size_radius_scale: 0.6
  apply_status_gate: true

gem_oil_gas:
  main_sheet: Field-level main data
  country_column: Country/Area
  lat_column: Latitude
  lon_column: Longitude
  status_column: Status
  status_allow:
    - operating
    - in-development
    - discovered
  onshore_column: Onshore/Offshore
  point_buffer_m: 200
  point_buffer_onshore_m: 300
  point_buffer_offshore_m: 500

vnf:
  lat_column: Lat_GMTCO
  lon_column: Lon_GMTCO
  rhi_column: RHI
  buffer_m: 750
  rhi_sentinel_max: 1000000.0
weights:
  coal_and_solid_fuels:
    w_osm: 0.2
    w_clc_131: 0.4
    w_clc_121: 0.05
    w_gem_coal : 0.35
  oil_upstream_and_transport:
