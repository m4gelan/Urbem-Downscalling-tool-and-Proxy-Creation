corine:
  band: 1
  min_patch_area_m2: 50000
  max_match_distance_km: 30.0
  l3_codes_household:
    - 111
    - 112
  l3_codes_service:
    - 121
  l3_codes_industrial:
    - 121
    - 133
  l3_codes_transport:
    - 122
  
# OSM from fugitive_layers.gpkg (plugin default layer name ``osm_energy_polygons`` unless you rebuilt with --layer).
osm:
  metric_crs: EPSG:3035
  domain_clip_buffer_m: 0
  buffer_m:
    point: 0
    line: 0
    polygon: 25
  layer_order:
    - osm_roads
    - osm_landuse
    - osm_buildings
    - osm_aeroway
  rasterize:
    burn_value: 1.0
    fill: 0.0
    dtype: float32
    all_touched: true
  subgroups:
    service:
      slots:
        - id: service
          buffer_m:
            polygon: 25
          match:
            any_of:
              - landuse: retail
              - landuse: commercial
              - landuse: civic
              - landuse: public
    industrial:
      slots:
        - id: industrial
          buffer_m:
            polygon: 25
          match:
            any_of:
              - building: industrial
              - building: commercial
              - building: warehouse
              - building: service
              - aeroway: true
    roads:
      slots:
        - id: roads
          buffer_m:
            line: 5
          match:
            any_of:
              - highway: motorway
              - highway: motorway_link
              - highway: trunk
              - highway: trunk_link
              - highway: primary
              - highway: primary_link
              - highway: secondary
              - highway: secondary_link
              # tertiary + residential omitted for faster national runs (dense OSM line count)

weights:
  household:
    w_corine : 0.3
    w_population: 0.7
  service:
    w_corine_urban: 0.4
    w_corine_service: 0.35
