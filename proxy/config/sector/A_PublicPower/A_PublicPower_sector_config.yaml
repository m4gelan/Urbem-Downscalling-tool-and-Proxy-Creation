filepaths:
  CORINE : 
    path: INPUT/Proxy/CORINE/U2018_CLC2018_V2020_20u1.tif
  NUTS REGIONS :
    path: INPUT/Proxy/Boundaries/NUTS_RG_20M_2021_3035.gpkg
  POPULATION :
    path: INPUT/Proxy/Population/JRC-ESTAT_Census_Population_2021_100m.tif
  CAMS :
    path: INPUT/Emissions/CAMS-REG-v8_1_emissions_year2019.nc
  JRC :
    path: INPUT/Proxy/ProxySpecific/PublicPower/JRC_OPEN_UNITS.csv
  LCP :
    path: INPUT/Proxy/EPRTR/F5_2_LCP_Energy_Emissions.csv

pollutants:
  - CO
  - NOx
  - NH3
  - NMVOC
  - PM10
  - PM2.5
  - SOx

cams_point_sources:
  year: 2019
  emission_category_indices: [1]
  source_type_indices: [2]
  match_mode: distance
  max_match_distance_km: 10.0

# CAMS area grid (source_type_index 1 = area); used for area weights only
cams_area_sources:
  year: 2019
  emission_category_indices: [1]
  source_type_indices: [1]

eprtr_point_sources:
  reportingYears: [2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]


# L3 CLC codes (three-digit); see PROXY/config/corine/eea44_index_to_l3.yaml
corine:
  l3_codes: [121]
  band: 1

# S = w1*pop_z + w2*pop_z**(1 - delta*CORINE); CORINE mask is 0/1 eligibility.
# multiband_raster_field: duplicate "S" or per-cell-normalised "W" into each pollutant band.
area_weights:
  w1: 0.4
  w2: 0.6

area_weights_debug:
  viz_pollutants:
    - PM10
    - NOx