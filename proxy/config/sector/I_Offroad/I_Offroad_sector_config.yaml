# OSM: ``INPUT/Preprocess/OSM/osm_engine/osm_schema.yaml`` sector ``offroad`` → offroad_layers.gpkg.
osm:
  metric_crs: EPSG:3035
  domain_clip_buffer_m: 0
  buffer_m:
    point: 50
    line: 35
    polygon: 25
  layer_order:
    - osm_offroad_rail_lines
    - osm_offroad_pipeline_lines
    - osm_offroad_pipeline_facilities
    - osm_offroad_rail_areas
    - osm_offroad_areas
    - osm_offroad_industrial
    - osm_offroad_military
  rasterize:
    burn_value: 1.0
    fill: 0.0
    dtype: float32
    all_touched: true
  subgroups:
    rail_transport:
      slots:
        - id: rail_diesel
          buffer_m:
            line: 40
          match:
            any_of:
              - rail_propulsion: diesel
        - id: rail_electric
          buffer_m:
            line: 40
          match:
            any_of:
              - rail_propulsion: electric

        - id: rail_yards
          buffer_m:
            polygon: 30
          match:
            any_of:
              # Rail facility polygons (explicit tags)
              - railway: depot
              - railway: yard
              - railway: workshop
              - railway: halt
              - railway: station
              - railway: platform
              # Standard broad-brush railway landuse
              - landuse: railway
              # landuse=industrial + industrial=rail_yard
              - landuse: industrial
                industrial: rail_yard
              # Fallback for any missed landuse=railway
              - landuse: railway
 
    pipeline_transport:
      slots:
        # Compressors and compressor stations (nodes and polygons)
        - id: oil_gas_facilities
          buffer_m:
            point: 80
            polygon: 28
          match:
            any_of:
              - man_made: compressor
              - man_made: compressor_station
              - man_made: gas_compressor
              - pipeline: substation
                substation: compression
              - man_made: pumping_station
              - substance: gas
              - industrial: gas
              - man_made: works
              - industrial: oil_and_gas
              - man_made: works
              - industrial: petroleum
              - man_made: works
              - man_made: valve
              - man_made: pipeline_valve
              - pipeline: valve

        # Hydrocarbon pipelines (lines)
        - id: pipeline_hydrocarbon
          buffer_m:
            line: 45
          match:
            any_of:
              - man_made: pipeline
                substance: gas
              - man_made: pipeline
                substance: natural_gas
              - man_made: pipeline
                substance: oil
              - man_made: pipeline
                substance: petroleum
    
    manufacturing_mobile:
      slots:
        - id: industrial_sites
          buffer_m:
            point: 50
            polygon: 25
          match:
            any_of:
              - industrial: mine
              - industrial: quarry
              - industrial: manufacturing
              - industrial: steelmaking
              - industrial: chemical
              - industrial: cement
              - industrial: oil
              - industrial: refinery
              - industrial: sawmill
              - industrial: shipyard
              - industrial: port

    other_mobile:
      slots:
        - id: military
          buffer_m:
            point: 50
            polygon: 25
          match:
            any_of:
              - landuse: military
              - military: "*"

# CEIP legs ``I_Offroad_groups.yaml``: G1 rail / G2 pipeline / G3 non-road.
weights:
  rail_transport:
    w_osm_diesel: 0.6
    w_osm_electric: 0.05
    w_osm_yard: 0.35
  pipeline_transport:
    w_osm_oil_gas_facilities: 0.7
    w_osm_pipeline_hydrocarbon: 0.3
  non_road_machinery:
    w_clc_121: 0.35
    w_clc_123: 0.15
    w_clc_124: 0.10
    w_clc_131: 0.40
  manufacturing_mobile:
    w_osm: 0.6
    w_corine: 0.4
  other_mobile:
    w_osm: 0.6
    w_corine: 0.4
