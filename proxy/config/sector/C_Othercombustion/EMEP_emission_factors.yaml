note: >
  Emission factors from EMEP/EEA air pollutant emission inventory guidebook 2023,
  chapter 1.A.4 (residential and commercial combustion). Values in `ef` are g/GJ
  on NCV basis unless noted. `ef` keys match proxy.core.alias small_cap
  (e.g. sox, pm2_5). Each row carries:
    - gains_class: target GAINS appliance class(es) using this EF
    - gains_fuel : GAINS fuel name(s) routed to this EMEP fuel
  Use these to drive the GAINS -> EMEP mapping in load_c_othercombustion_specific.

gains_fuel_groups:
  Coal fuels:
    - Brown coal/lignite grade 1
    - Brown coal/lignite grade 2 (also peat)
    - Hard coal, grade 1
    - Hard coal, grade 2
    - Hard coal, grade 3
  Solid fuel (not biomass):
    - Derived coal (coke, briquettes)
  Biomass - wood:
    - Fuelwood
  Biomass - agricultural residues:
    - Agricultural residues
  Biomass - dung:
    - Dung

tables:

# ============================================================
# SOLID FUEL (non-biomass) — fireplaces, stoves, small boilers
# ============================================================

- fuel: Solid fuel (not biomass)
  appliance: Fireplaces, saunas and outdoor heaters
  gains_class: [R_FIREPLACE]
  gains_fuel: [Derived coal (coke, briquettes)]
  ef:
    nox: 60
    sox: 500
    nh3: 5
    pm2_5: 330
    pm10: 330
    co: 5000
    nmvoc: 600


- fuel: Solid fuel (not biomass)
  appliance: Stoves
  gains_class: [R_HEATING_STOVE, R_COOKING_STOVE]
