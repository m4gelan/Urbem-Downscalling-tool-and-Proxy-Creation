filepaths:
  CAMS:
    path: INPUT/Emissions/CAMS-REG-v8_1_emissions_year2019.nc
  CORINE:
    path: INPUT/Proxy/CORINE/U2018_CLC2018_V2020_20u1.tif
  Population:
    path: INPUT/Proxy/Population/JRC-ESTAT_Census_Population_2021_100m.tif
  GHS_SMOD:
    path: INPUT/Proxy/Population/GHS_SMOD_E2030_GLOBE_R2023A_54009_1000_V2_0.tif
  EUROSTAT:
    path: proxy/config/sector/C_Othercombustion/eurostat_end_use.yaml
  GAINS: 
    year : 2020
    mapping_filepath: proxy/config/sector/C_Othercombustion/GAINS_mapping.yaml
    folder : INPUT/Proxy/ProxySpecific/OtherCombustion/GAINS
  EMEP:
    path: proxy/config/sector/C_Othercombustion/EMEP_emission_factors.yaml
  HOTMAPS_RESIDENTIAL:
    path: INPUT/Proxy/ProxySpecific/OtherCombustion/Hotmaps/heat_res_curr_density.tif
  HOTMAPS_NON_RESIDENTIAL:
    path: INPUT/Proxy/ProxySpecific/OtherCombustion/Hotmaps/heat_nonres_curr_density.tif
  Alpha:
    path: INPUT/Proxy/Alpha/Reported_Emissions_EU27_2018_2023.xlsx
    config: proxy/config/alpha_methods.yaml

eurostat:
  enabled: true

pollutants:
- CO
- NOx
- NH3
- NMVOC
- PM10
- PM2.5
- SOx

cams_sector_cells:
  year: 2019
  emission_category_indices: [3]
  source_type_indices: [1]

cams_area_emissions:
  year: 2019
  emission_category_indices: [3]
  source_type_indices: [1]

  
corine:
  band: 1
  min_patch_area_m2: 50000
  max_match_distance_km: 30.0
  l3_code_111:
    - 111
  l3_code_112:
    - 112
  l3_code_121:
    - 121
  l3_code_221:
    - 221

ghsl_smod:
  rural_codes: [11, 12, 13, 21, 22]
  band: 1
# OSM from fugitive_layers.gpkg (plugin default layer name ``osm_energy_polygons`` unless you rebuilt with --layer).



stock_support:
  residential:
    fireplace:
      use_population: false
      population_only: false
      weight_corine_111: 0.0
      weight_corine_112: 0.4
      weight_corine_121: 0.0
      weight_corine_221: 0.0
      weight_ghsl_smod: 0.6
    heating_stove:
      use_population: false
      population_only: false
      weight_corine_111: 0.45
      weight_corine_112: 0.45
      weight_corine_121: 0.0
      weight_corine_221: 0.1
      weight_ghsl_smod: 0.1
    cooking_stove:
      use_population: true
      population_only: true
      weight_corine_111: 0.0
      weight_corine_112: 0.0
      weight_corine_121: 0.0
      weight_corine_221: 0.0
      weight_ghsl_smod: 0.0
    boiler_aut:
      use_population: false
      population_only: false
      weight_corine_111: 0.75
      weight_corine_112: 0.25
      weight_corine_121: 0.0
      weight_corine_221: 0.0
      weight_ghsl_smod: 0.0
    boiler_man:
      use_population: false
      population_only: false
      weight_corine_111: 0.0
      weight_corine_112: 0.25
      weight_corine_121: 0.0
      weight_corine_221: 0.0
      weight_ghsl_smod: 0.75
  commercial:
    boiler:
      use_population: false
      population_only: false
      weight_corine_111: 0.2
      weight_corine_112: 0.2
      weight_corine_121: 0.8
      weight_corine_221: 0.0
      weight_ghsl_smod: 0.0

load_support:
  R_FIREPLACE: pop
  R_HEATING_STOVE: pop
  R_COOKING_STOVE: constant
  R_BOILER_MAN:
    pop: 0.7
    h_res: 0.3
  R_BOILER_AUT:
    pop: 0.7
    h_res: 0.3
  C_BOILER_MAN: h_nres
  C_BOILER_AUT: h_nres

buckets:
  - name: space_heating
  - name: space_and_water_heating
  - name: cooking
  - name: commercial

classes:
  - name: R_FIREPLACE
  - name: R_HEATING_STOVE
  - name: R_COOKING_STOVE
  - name: R_BOILER_MAN
  - name: R_BOILER_AUT
  - name: C_BOILER_MAN
  - name: C_BOILER_AUT

area_weights_debug:
  viz_classes:
    - R_HEATING_STOVE
    - C_BOILER_AUT
  viz_pollutants:
    - NMVOC
    - SOx

