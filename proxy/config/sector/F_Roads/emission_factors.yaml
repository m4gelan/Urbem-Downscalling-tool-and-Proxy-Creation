note: >
  EMEP/EEA guidebook 2023 update 2025, chapter 1.A.3.b.i-iv (road transport), Tier 1.
  Values in `ef` are g/kg fuel (Tables 3-5 to 3-7 mean columns). 
  SOx is not tabulated in 3-5 to 3-7: derived as SO2 from fuel sulphur (Table 3-14,
  Fuel 2009 and later) via E_SO2 = 2 * k_S * FC with k_S [g S / g fuel] = ppm * 1e-6,
  hence ef.sox [g SO2 / kg fuel] = 2 * sulphur_ppm * 1e-3 (gasoline 5 ppm → 0.01,
  diesel 3 ppm → 0.006). LPG has no row in Table 3-14; gasoline sulphur applied.
  Tyres, breaks and road surface (Non-exhaust) are derived from chapter 1.A.3.vi-vii
  Gasoline evaporation is derived from chapter 1.A.3.v



