# GNFR J — Waste (proxy). 

filepaths:
  CAMS:
    path: INPUT/Emissions/CAMS-REG-v8_1_emissions_year2019.nc
  OSM:
    path: INPUT/Proxy/OSM/Country/agricultural_layers.gpkg
  NUTS:
    path: INPUT/Proxy/Boundaries/NUTS_RG_20M_2021_3035.gpkg
  CORINE:
    path: INPUT/Proxy/CORINE/U2018_CLC2018_V2020_20u1.tif
  VIIRS:
    folder: INPUT/Proxy/ProxySpecific/Agriculture/VIIRS
  Farmstock:
    path : INPUT/Proxy/ProxySpecific/Agriculture/C21.gpkg
  LUCAS:
    path : INPUT/Proxy/ProxySpecific/Agriculture/EU_LUCAS_2022.csv
  Alpha:
    path: INPUT/Proxy/Alpha/Reported_Emissions_EU27_2018_2023.xlsx
    config: proxy/config/alpha_methods.yaml
  RI-URBANS:
    path: INPUT/Proxy/Emissions_RI-URBANS_2018_main_v1_0.csv

pollutants:
  - CO
  - NOx
  - NH3
  - NMVOC
  - PM10
  - PM2.5
  - SOx


cams_sector_cells:
  year: 2019
  emission_category_indices: [14, 15]
  source_type_indices: [1, 2]

cams_area_emissions:
  year: 2019
  emission_category_indices: [14, 15]
  source_type_indices: [1]

cams_point_sources:
  year: 2019
  emission_category_indices: [14, 15]
  source_type_indices: [2]
  match_mode: cams_cell

ri_urbans_point_sources:
  gnfr_sectors: [K, L]


corine:
  band: 1
  min_patch_area_m2: 200
  pasture_l3_codes: [231, 243, 242, 244, 321]
  fodder_l3_codes : [231, 241, 243]
  non_fodder_high_manure_l3_codes: [211]
  non_fodder_medium_manure_l3_codes: [212]
  non_fodder_low_manure_l3_codes: [221, 222, 223]
  broad_agricultural_signal : [211, 212, 213, 241, 242, 221, 222, 223, 243, 244]
  biomass_burning_l3_codes: [211, 212, 213, 221, 222, 223, 241, 242, 243, 244]

LUCAS:
  country_column: POINT_NUTS0
  lat_column: POINT_LAT
  lon_column: POINT_LONG
  livestock_housing:
    match_any:
      - - { column: SURVEY_LU1, value: U111 }
        - { column: SURVEY_LC1, value: [A11, A12] }
      - - { column: SURVEY_LU2, value: U111 }
        - { column: SURVEY_LC2, value: [A11, A12] }
    buffer_m: 50
  pasture:
    match:
      - { column: SURVEY_GRAZING, value: 1 }
    buffer_m: 50

  lucas_crop_group_priority:
    - fodder
    - non_fodder_high_manure
    - non_fodder_medium_manure
    - non_fodder_low_manure
  nuts2_column: POINT_NUTS2
  inorganic_n_fertilizer:
    lucas_buffer_m: 1500
    nuts2_min_lucas_count: 5
    lucas_filter:
      match_any:
        - { column: SURVEY_LC1, value: [B11, B12, B13, B14, B15, B16, B17, B18, B19, B21, B22, B23, B31, B32, B33, B34, B35, B36, B37, B41, B42, B43, B44, B45, B51, B52, B53, B54, B55, B71, B72, B73, B74, B75, B76, B77, B81, B82, B83, B84, BX1, BX2] }
        - { column: SURVEY_LC1, value: E10 }
        - - { column: SURVEY_LU1, value: U111 }
          - { column: SURVEY_LC1, value: E20 }
    agricultural_l3_codes: [211, 212, 213, 221, 222, 223, 231, 241, 242, 243, 244, 321, 322]
    clc_to_lucas_lc1:
      211: [B11, B12, B13, B14, B15, B16, B18, B19, B21, B22, B23, B31, B32, B33, B34, B35, B36, B37, B41, B42, B43, B44, B45, BX1, BX2]
      212: [B11, B12, B16, B17, B21, B22, B42, B43]
      213: [B17]
      221: [B82]
      222: [B71, B72, B73, B75, B76, B77]
      223: [B81]
      231: [E10, E20]
      241: [B11, B12, B71, B72, B82]
      242: [B11, B12, B13, B21, B31, B32, B71, B82]
      243: [B11, B13, B19, E10, E30]
      244: [B71, B72, B74, E10]
      321: [E30]
      322: [E30]
  crop_nmvoc:
    lucas_buffer_m: 1500
    nuts2_min_lucas_count: 5
    lucas_filter:
      match_any:
        - { column: SURVEY_LC1, value: [B11, B12, B13, B14, B15, B16, B17, B18, B19, B21, B22, B23, B32, B41, B51, B52, B53, B54, B55] }
        - { column: SURVEY_LC1, value: E10 }
        - - { column: SURVEY_LU1, value: U111 }
          - { column: SURVEY_LC1, value: E20 }
    agricultural_l3_codes: [211, 212, 213, 221, 222, 223, 231, 241, 242, 243, 244, 321, 322]
    clc_to_lucas_lc1:
      211: [B11, B12, B13, B14, B15, B16, B18, B19, B21, B22, B23, B32, B41]
      212: [B11, B12, B16, B17, B21, B22]
      213: [B17]
      221: [B82]
      222: [B71, B72, B73, B75, B76, B77]
      223: [B81]
      231: [E10, E20]
      241: [B11, B12]
      242: [B11, B12, B13, B21, B32]
      243: [B11, B13, B19]
      244: [B71, B72, B74]
      321: []
      322: []
  manure_application_to_soils:
    fodder : 
      match_any:
        - - { column: SURVEY_LU1, value: [U111, U113] }
          - { column: SURVEY_LC1, value: [E10, E20, B51, B52, B53, B54, B55]}
      buffer_m: 500
          # correspond to grassland, and fodder crops.
    non_fodder_high_manure: 
      match_any:
        - - { column: SURVEY_LU1, value: [U111, U113] }
          - { column: SURVEY_LC1, value: [B11, B13, B21, B22, B23, B32, B41, B42, B43, B44, B45]}
          # correspond to  Potato, sugar beet, other root crops, vegetables, barley, rape, soft wheat.  
      buffer_m: 500
    non_fodder_medium_manure: 
      match_any:
        - - { column: SURVEY_LU1, value: [U111, U113] }
          - { column: SURVEY_LC1, value: [B12, B14, B15, B16, B17, B18, B19, B31]}
          #correspond to durum wheat, rye, oats, maize, rice, triticale, other cereals.
      buffer_m: 500
    non_fodder_low_manure: 
      match_any:
        - - { column: SURVEY_LU1, value: [U111, U113] }
          - { column: SURVEY_LC1, value: [B71, B72, B73, B74, B75, B76, B77, B81, B82, B83, B84]}
          #correspond to Fruits, citrus, olives, oil crops, grapes, other permanent crops.
      buffer_m: 500


Farmstock:
  nuts2_column: nuts2
  species_columns:
    bovine:
      layer: Bovine
      count_column: Bovine
    goats:
      layer: Goats
      count_column: Goats
    pigs:
      layer: Pigs
      count_column: A3100
    poultry:
      layer: Poultry
      count_column: Poultry
    sheep:
      layer: Sheep
      count_column: Sheep

VIIRS:
  type : [0]
  confidence : ['n', 'h']
  frp_threshold : 1
  buffer_m : 200

weights:
  livestock_housing_pasture:
    built:
      w_osm: 0.65
      w_lucas : 0.35
    pasture : 
      w_clc231 : 0.6
      w_clc243 : 0.1
      w_clc242 : 0.1
      w_clc244 : 0.1
      w_clc321 : 0.1
  broad_agricultural_signal:
    w_clc211 : 1
    w_clc212 : 1
    w_clc213 : 1
    w_clc221 : 1
    w_clc222 : 1
    w_clc223 : 1
    w_clc241 : 1
    w_clc242 : 1
    w_clc243 : 0.5
    w_clc244 : 0.5
    
 
osm:
  metric_crs: EPSG:3035
  domain_clip_buffer_m: 0
  # Preprocessed GPKG (osm_engine agricultural profile): points already buffered 40 m in layer.
  buffer_m:
    point: 50
    line: 0
    polygon: 50
  layer_order:
    - agricultural_farmyard
    - agricultural_points_buffered
  rasterize:
    burn_value: 1.0
    fill: 0.0
    dtype: float32
    all_touched: true

area_weights_debug:
  viz_pollutants:
    - NH3
    - NMVOC
    - PM2.5
