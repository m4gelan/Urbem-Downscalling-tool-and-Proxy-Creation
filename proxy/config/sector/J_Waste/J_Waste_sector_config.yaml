# GNFR J — Waste (proxy). 

filepaths:
  CAMS:
    path: INPUT/Emissions/CAMS-REG-v8_1_emissions_year2019.nc
  OSM:
    path: INPUT/Proxy/OSM/Country/waste_layers.gpkg
  EPRTR:
    path: INPUT/Proxy/EPRTR/F1_4_Air_Releases_Facilities.csv
  CORINE:
    path: INPUT/Proxy/CORINE/U2018_CLC2018_V2020_20u1.tif
  Population:
    path: INPUT/Proxy/Population/JRC-ESTAT_Census_Population_2021_100m.tif
  GHSL_SMOD:
    path: INPUT/Proxy/Population/GHS_SMOD_E2030_GLOBE_R2023A_54009_1000_V2_0.tif
  Alpha:
    path: INPUT/Proxy/Alpha/Reported_Emissions_EU27_2018_2023.xlsx
    config: proxy/config/alpha_methods.yaml
  UWWTD_TreatmentPlants:
    path: INPUT/Proxy/ProxySpecific/Waste/UWWTD_TreatmentPlants.gpkg
  UWWTD_Agglomerations:
    path: INPUT/Proxy/ProxySpecific/Waste/UWWTD_Agglomerations.gpkg
  Imperviousness:
    path: INPUT/Proxy/ProxySpecific/Waste/imperviousness_density_2021_NET.tif
  RI-URBANS:
    path: INPUT/Proxy/Emissions_RI-URBANS_2018_main_v1_0.csv

  


pollutants:
  - CO
  - NOx
  - NH3
  - NMVOC
  - PM10
  - PM2.5
  - SOx

cams_point_sources:
  year: 2019
  emission_category_indices: [13]
  source_type_indices: [2]
  match_mode: cams_cell
  max_match_distance_km: 15.0

ri_urbans_point_sources:
  gnfr_sector: J

cams_area_sources:
  year: 2019
  emission_category_indices: [13]
  # to get the full grid we add point source type as well (important for downscaling)
  source_type_indices: [1, 2]

  
eprtr_point_sources:
  reportingYears: [2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
  eprtr_sector_code: 5
  eprtr_sub_sector_codes: ["5(a)", "5(b)", "5(c)", "5(d)", "5(e)", "5(f)", "5(g)"]

uwwtd_point_sources:
  max_match_distance_km: 15.0
  active_only: true

uwwtd_area_rasters:
  agglomeration_buffer_m: 500
  treatment_plant_buffer_m: 500
  imperviousness_band: 1


ghsl_smod:
  rural_codes: [11, 12, 13, 21, 22]
  band: 1

corine:
  band: 1
  min_patch_area_m2: 200
  max_match_distance_km: 30.0
  solid_waste_w1:
    l3_codes: [132]   
  solid_waste_w2:
    l3_codes: [121]

weights:
  solid_waste:
    w1: 0.65 # CLC 132
    w2: 0.15 # CLC 121
    w3: 0.3 # OSM
  wastewater:
    w1: 0.35 # UWWTD agglomerations
    w2: 0.35 # UWWTD treatment plants
    w3: 0.05 # Population
    w4: 0.25 # Imperviousness
  residual:
    w1: 0.4 # Population
    w2: 0.45 # GHSL SMOD rural classes
    w3: 0.1 # Imperviousness

osm:
  metric_crs: EPSG:3035
  domain_clip_buffer_m: 0
  buffer_m:
    point: 50
    line: 10
    polygon: 20
  layer_order:
    - osm_waste_polygons
    - osm_waste_points
  row_tags:
    - name
    - landuse
    - amenity
    - man_made
  rules:
    nodes:
      - match:
          tag:
            key: amenity
            in: [waste_disposal, recycling]
        layers:
          - osm_waste_points
    areas:
      - match:
          tag:
            key: landuse
            equals: landfill
        layers:
          - osm_waste_polygons
      - match:
          tag:
            key: amenity
            in: [waste_disposal, recycling]
        layers:
          - osm_waste_polygons
      - match:
          tag:
            key: man_made
            equals: wastewater_plant
        layers:
          - osm_waste_polygons
        when: include_wastewater_plant
  rasterize:
    burn_value: 1.0
    fill: 0.0
    dtype: float32
    all_touched: true

area_weights_debug:
  viz_pollutants:
    - NMVOC
    - SOx
