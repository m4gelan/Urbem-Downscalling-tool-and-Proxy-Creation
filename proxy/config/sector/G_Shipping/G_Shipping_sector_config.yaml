# G_Shipping area pipeline defaults (merged under sector YAML `shipping:`).

filepaths:
  CORINE : 
    path: INPUT/Proxy/CORINE/U2018_CLC2018_V2020_20u1.tif
  NUTS REGIONS :
    path: INPUT/Proxy/Boundaries/NUTS_RG_20M_2021_3035.gpkg
  CAMS :
    path: INPUT/Emissions/CAMS-REG-v8_1_emissions_year2019.nc
  EMODNET :
    path: INPUT/Proxy/ProxySpecific/Shipping/vesseldensity_all_2019.tif
  OSM :
    path: INPUT/Proxy/OSM/Country/shipping_layers.gpkg

pollutants:
  - CO
  - NOx
  - NH3
  - NMVOC
  - PM10
  - PM2.5
  - SOx

cams_sector_cells:
  year: 2019
  emission_category_indices: [10]
  source_type_indices: [1]

cams_area_emissions:
  year: 2019
  emission_category_indices: [10]
  source_type_indices: [1]
# L3 CLC codes (three-digit); see PROXY/config/corine/eea44_index_to_l3.yaml

corine:
  l3_codes: [123]
  band: 1

emodnet:
  band: 1

# Runtime: read GPKG layers in layer_order, clip to CAMS domain, buffer by geometry type, rasterize.

# rules / row_tags document the preprocess contract (INPUT/Preprocess/OSM); not evaluated here.

osm:
  metric_crs: EPSG:3035
  domain_clip_buffer_m: 0
  buffer_m:
    point: 30
    line: 10
    polygon: 10

  layer_order:
    - osm_shipping_high
    - osm_shipping_medium

  row_tags:
    - name
    - landuse
    - harbour
    - natural
    - industrial
    - man_made

  rules:
    nodes:
      - match:
          tag:
            key: harbour
            equals: "yes"
        layers:
          - osm_shipping_high
        extra_fields:
          shipping_priority: high
    lines:
      - match:
          any_of:
            - tag:
                key: landuse
                equals: port
            - tag:
                key: harbour
                equals: "yes"
            - tag:
                key: natural
                equals: harbour
        layers:
          - osm_shipping_high
        extra_fields:
          shipping_priority: high
      - match:
          tag:
            key: man_made
            in:
              - pier
              - quay
              - breakwater
        layers:
          - osm_shipping_medium
        extra_fields:
          shipping_priority: medium
    areas:
      - match:
          any_of:
            - tag:
                key: landuse
                equals: port
            - tag:
                key: harbour
                equals: "yes"
            - tag:
                key: natural
                equals: harbour
        layers:
          - osm_shipping_high
        extra_fields:
          shipping_priority: high
      - match:
          tag:
            key: man_made
            in:
              - pier
              - quay
              - breakwater
        layers:
          - osm_shipping_medium
        extra_fields:
          shipping_priority: medium
  rasterize:
    burn_value: 1.0
    fill: 0.0
    dtype: float32
    all_touched: true

# S = w1*EMODNET + w2*OSM + w3*PORT; CORINE mask is 0/1 eligibility.

# multiband_raster_field: duplicate "S" or per-cell-normalised "W" into each pollutant band.

area_weights:
  w1: 0.3
  w2: 0.6
  w3: 0.1



