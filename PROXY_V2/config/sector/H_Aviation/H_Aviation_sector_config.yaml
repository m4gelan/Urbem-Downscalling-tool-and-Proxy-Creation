# GNFR H — Aviation (PROXY_V2). Point matching: OSM aerodrome polygons → match location + CAMS Hungarian.

filepaths:
  CAMS:
    path: INPUT/Emissions/CAMS-REG-v8_1_emissions_year2019.nc
  OSM:
    path: INPUT/Proxy/OSM/aviation_layers.gpkg
  CORINE:
    path: INPUT/Proxy/CORINE/U2018_CLC2018_V2020_20u1.tif

pollutants:
  - CO
  - NOx
  - NH3
  - NMVOC
  - PM10
  - PM2.5
  - SOx

cams_point_sources:
  year: 2019
  emission_category_indices: [11]
  source_type_indices: [2]
  max_match_distance_km: 15.0

# Same rules as PROXY/sectors/H_Aviation/README.md (polygon pool + apron match location).
point_matching:
  min_polygon_area_km2: 0.05
  # Metres: expand CAMS-point WGS84→metric bbox by this amount before clipping OSM (default 15 km).
  osm_clip_buffer_m: 15000
  aviation_terminal_apron_gpkg: null
  aviation_terminal_apron_layers: []

# CORINE second pass for point matching (same metric clip as OSM). L3 124 = Airports.
# Keys match sector/H_Aviation/pipeline.py (band, l3_codes, min_patch_area_m2, max_match_distance_km).
corine:
  l3_codes: [124]
  band: 1
  min_patch_area_m2: 50000
  max_match_distance_km: 30.0

osm:
  metric_crs: EPSG:3035
  domain_clip_buffer_m: 0
  buffer_m:
    point: 30
    line: 10
    polygon: 10
  layer_order:
    - osm_aviation_airport_polygons
  row_tags:
    - name
    - aeroway
    - iata
    - icao
    - operator
    - military
    - landuse
  rules:
    areas:
      - match:
          tag:
            key: aeroway
            equals: aerodrome
        layers:
          - osm_aviation_airport_polygons
      - match:
          tag:
            key: landuse
            equals: aerodrome
        layers:
          - osm_aviation_airport_polygons
      - match:
          tag:
            key: military
            equals: airfield
        layers:
          - osm_aviation_airport_polygons
  rasterize:
    burn_value: 1.0
    fill: 0.0
    dtype: float32
    all_touched: true
