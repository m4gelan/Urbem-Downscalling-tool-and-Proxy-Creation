version: 3

# Run settings (paths). Tag / layer rules: ``osm_engine/osm_schema.yaml``.

defaults:
  pbf: INPUT/Preprocess/OSM/_source/europe-latest.osm.pbf
  nuts_gpkg: INPUT/Proxy/Boundaries/NUTS_RG_20M_2021_3035.gpkg
  output_dir: INPUT/Proxy/OSM
  output_name_template: "{id}_layers.gpkg"
  industry_prefilter_tags: true
  fugitive_prefilter_tags: true

sectors:
  - id: waste
    include_wastewater_plant: true
  - id: solvents
    with_optional: false
  - id: offroad
  - id: shipping
  - id: industry
    prefilter_tags: true
  - id: fugitive
    prefilter_tags: true
    gpkg_layer: osm_energy_polygons
    min_polygon_area_m2: 10.0
  - id: aviation
