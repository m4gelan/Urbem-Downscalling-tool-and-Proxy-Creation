version: 4

# Run settings (paths). Tag / layer rules: ``osm_engine/osm_schema.yaml``.

defaults:
  pbf: INPUT/Preprocess/OSM/_source/europe-latest.osm.pbf
  nuts_gpkg: INPUT/Proxy/Boundaries/NUTS_RG_20M_2021_3035.gpkg
  output_dir: INPUT/Proxy/OSM
  output_name_template: "{id}_layers.gpkg"
  min_polygon_area_m2: 10.0
  # flex_mem works on all pyosmium builds; dense_mmap optional on Linux if compiled in.
  pyosmium_idx: flex_mem
  show_parse_progress: true

sectors:
  - id: waste
    include_wastewater_plant: true
    prefilter_tags: true
  - id: solvents
    with_optional: false
    prefilter_tags: true
  - id: offroad
    prefilter_tags: true
  - id: shipping
    prefilter_tags: true
  - id: industry
    prefilter_tags: true
  - id: fugitive
    prefilter_tags: true
    min_polygon_area_m2: 10.0
  - id: aviation
    prefilter_tags: true
  - id: agricultural
    prefilter_tags: true
