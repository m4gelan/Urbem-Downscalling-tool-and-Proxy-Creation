# Paths relative to project root unless absolute.
# USER MUST CHECK: CEIP sheet columns, OSM GPKG attributes, ref_tif choice.

defaults:
  # Used when a fine pixel is outside the NUTS country hull (country_id == 0).
  fallback_country_iso3: "GRC"

paths:
  cams_nc: "data/given_CAMS/CAMS-REG-ANT_v8.1_TNO_ftp/netcdf/CAMS-REG-v8_1_emissions_year2019.nc"
  ref_tif: "SourceProxies/outputs/EL/Residential_sourcearea.tif"
  corine: "data/CORINE/U2018_clc2018_v2020_20u1_raster100m/DATA/U2018_CLC2018_V2020_20u1.tif"
  osm_fugitive_gpkg: "data/Fugitive/osm_fugitive_polygons.gpkg"
  population_tif: "data/Population/JRC-ESTAT_Census_Population_2021_100m.tif"
  ceip_xlsx: "data/Fugitive/CEIP_Fugitive.xlsx"
  ceip_sheet: null
  ceip_year: 2019
  nuts_gpkg: "Data/geometry/NUTS_RG_20M_2021_3035.gpkg"
  ceip_groups_yaml: "Fugitive/config/fugitive_ceip_groups.yaml"

output:
  dir: "SourceProxies/outputs"
  weights_tif: "Fugitive_areasource.tif"
  write_debug_rasters: false

pollutants:
  - ch4
  - co
  - nh3
  - nmvoc
  - nox
  - pm10
  - pm2_5
  - sox

ceip_pollutant_aliases:
  PM25: PM2_5
  PM2.5: PM2_5
  NOX: NOX

proxy:
  # Log raster/GPKG sanity checks (finite fraction, min/max, counts). Set false to reduce noise.
  log_input_stats: true
  # OSM rasterization is tiled so peak RAM ~ (osm_tile_pixels * osm_subdivide_factor)^2, not full grid.
  osm_tile_pixels: 256
  osm_subdivide_factor: 4
  w_osm_in_sector: 0.6
  w_clc_in_sector: 0.4
  w_sector_in_p: 0.8
  w_pop_in_p: 0.2

logging:
  level: INFO
