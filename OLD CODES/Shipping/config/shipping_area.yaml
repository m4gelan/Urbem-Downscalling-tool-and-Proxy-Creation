# GNFR G shipping area-source weights (fine grid = CORINE + NUTS window, same as other SourceProxies builders).
# Paths are relative to the project root unless absolute.
# sectors.json can override paths.cams_nc, paths.corine, paths.nuts_gpkg when run via build_proxies.

country:
  nuts_cntr: EL

corine_window:
  pad_m: 5000

paths:
  cams_nc: data/given_CAMS/CAMS-REG-ANT_v8.1_TNO_ftp/netcdf/CAMS-REG-v8_1_emissions_year2019.nc
  corine: data/CORINE/U2018_clc2018_v2020_20u1_raster100m/DATA/U2018_CLC2018_V2020_20u1.tif
  nuts_gpkg: Data/geometry/NUTS_RG_20M_2021_3035.gpkg
  emodnet: data/Shipping/EMODnet/EMODnet_HA_Vessel_Density_allAvg/vesseldensity_all_2019.tif
  osm_gpkg: data/Shipping/osm_shipping_layers.gpkg

proxy:
  osm_subdivide: 4
  write_diagnostics: false

output:
  dir: SourceProxies/outputs/EL
  filename: Shipping_areasource.tif
