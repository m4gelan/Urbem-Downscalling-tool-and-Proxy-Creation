# Normalized sector tokens (alphanumeric only, uppercase) -> waste proxy family.
# Tokens are matched if the CEIP sector string equals the key OR starts with the key.
# Incineration codes are listed only under exclude_always — never mapped to a family.

families:
  solid:
    - "5A"
    - "5B1"
    - "5B2"
  ww:
    - "5D1"
    - "5D2"
    - "5D3"
  res:
    - "5C2"
    - "5E"

exclude_always:
  - "5C1A"
  - "5C1BI"
  - "5C1BII"
  - "5C1BIII"
  - "5C1BIV"
  - "5C1BV"
  - "5C1BVI"
